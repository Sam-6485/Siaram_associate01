kind = "web"
previewPath = "/"
title = "Siyaram Associates"
version = "1.0.0"
id = "artifacts/siyaram-associates"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21301

[services.development]
run = "pnpm --filter @workspace/siyaram-associates run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/siyaram-associates", "run", "build" ]
publicDir = "artifacts/siyaram-associates/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21301"
BASE_PATH = "/"
